<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Deadline Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary":"#3525cd","primary-container":"#4f46e5","on-primary":"#ffffff",
        "secondary":"#006c49","secondary-container":"#6cf8bb","on-secondary":"#ffffff","on-secondary-container":"#00714d",
        "tertiary":"#684000","tertiary-fixed":"#ffddb8","on-tertiary-fixed":"#2a1700","on-tertiary-fixed-variant":"#653e00",
        "surface":"#fcf8ff","surface-container":"#f0ecf9","surface-container-low":"#f5f2ff",
        "surface-container-high":"#eae6f4","surface-container-highest":"#e4e1ee","surface-container-lowest":"#ffffff",
        "on-surface":"#1b1b24","on-surface-variant":"#464555",
        "error":"#ba1a1a","error-container":"#ffdad6","on-error":"#ffffff","on-error-container":"#93000a",
        "outline":"#777587","outline-variant":"#c7c4d8",
        /* dark tokens */
        "d-surface":"#131318","d-surface-c":"#1f1f28","d-surface-cl":"#1b1b23",
        "d-surface-ch":"#292932","d-surface-clo":"#0e0e16",
        "d-on-surface":"#e5e1f0","d-on-surface-v":"#c7c4d8",
        "d-primary":"#c3c0ff","d-error":"#ffb4ab",
      },
      borderRadius:{"DEFAULT":"0.5rem","lg":"0.75rem","xl":"1rem","2xl":"1.5rem","full":"9999px"},
      fontFamily:{"sans":["Inter","sans-serif"]}
    }
  }
}
</script>
<style>
/* ── Base ───────────────────────────────────── */
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;transition:background 0.25s,color 0.25s}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}

/* ── Light surfaces ─────────────────────────── */
body{background:#fcf8ff;color:#1b1b24}
.bg-surf    {background:#fcf8ff}
.bg-surf-c  {background:#f0ecf9}
.bg-surf-cl {background:#f5f2ff}
.bg-surf-ch {background:#eae6f4}
.bg-surf-clo{background:#ffffff}
.text-os    {color:#1b1b24}
.text-osv   {color:#464555}
.border-ov  {border-color:#c7c4d8}
.glass-nav  {background:rgba(252,248,255,0.9);backdrop-filter:blur(24px)}

/* ── Dark mode overrides ────────────────────── */
.dark body  {background:#131318;color:#e5e1f0}
.dark .bg-surf    {background:#131318}
.dark .bg-surf-c  {background:#1f1f28}
.dark .bg-surf-cl {background:#1b1b23}
.dark .bg-surf-ch {background:#292932}
.dark .bg-surf-clo{background:#1f1f28}
.dark .text-os    {color:#e5e1f0}
.dark .text-osv   {color:#c7c4d8}
.dark .border-ov  {border-color:#34333d}
.dark .glass-nav  {background:rgba(19,19,24,0.9);backdrop-filter:blur(24px)}
.dark .text-indigo-900{color:#c3c0ff}
/* cards */
.dark .shadow-ambient{box-shadow:0 4px 20px rgba(0,0,0,0.35)}
/* inputs */
.dark .ifield{background:rgba(255,255,255,0.06)!important;color:#e5e1f0!important;border-color:rgba(255,255,255,0.08)!important}
.dark .ifield:focus{background:rgba(255,255,255,0.1)!important;border-color:#c3c0ff!important;box-shadow:0 0 0 3px rgba(195,192,255,0.12)!important}
.dark .ifield::placeholder{color:#777587!important}
/* sidebar */
.dark aside{background:#1f1f28}
/* hover states */
.dark .hover-ch:hover{background:#292932}
/* select */
.dark select.ifield option{background:#1f1f28;color:#e5e1f0}
/* toggle track */
.dark .toggle-bg{background:#34333d}
/* scrollbar */
.dark ::-webkit-scrollbar-thumb{background:#34333d}

/* ── Shadows ────────────────────────────────── */
.shadow-ambient{box-shadow:0px 4px 20px rgba(27,27,36,0.07)}
.shadow-ambient-lg{box-shadow:0px 16px 48px rgba(27,27,36,0.11)}
.dark .shadow-ambient-lg{box-shadow:0px 16px 48px rgba(0,0,0,0.4)}

/* ── Layout ─────────────────────────────────── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c7c4d8;border-radius:10px}
.pg{display:none}.pg.on{display:flex}
.screen{display:none}.screen.active{display:block;animation:fadeIn .2s ease}
#modal-overlay{display:none}#modal-overlay.open{display:flex}
#user-dd{display:none}#user-dd.open{display:block}

/* ── Animations ─────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease forwards}
.task-enter{animation:slideUp .2s ease forwards}
.shake{animation:shake .28s ease}
.spin{animation:spin .8s linear infinite}

/* ── Input field ────────────────────────────── */
.ifield{
  width:100%;background:rgba(240,236,249,0.8);border:1.5px solid transparent;
  border-radius:12px;padding:11px 15px;font-size:.875rem;outline:none;
  transition:all .18s;color:#1b1b24
}
.ifield:focus{background:#fff;border-color:#3525cd;box-shadow:0 0 0 4px rgba(53,37,205,.08)}
.ifield::placeholder{color:#777587}
select.ifield{cursor:pointer}

/* ── Auth card ──────────────────────────────── */
.auth-bg{
  background:
    radial-gradient(ellipse at 15% 65%,rgba(53,37,205,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(79,70,229,.06) 0%,transparent 50%),
    #fcf8ff
}
.dark .auth-bg{
  background:
    radial-gradient(ellipse at 15% 65%,rgba(53,37,205,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(79,70,229,.12) 0%,transparent 50%),
    #131318
}
.auth-tab{transition:all .18s;cursor:pointer;padding:7px 20px;border-radius:8px;font-weight:700;font-size:.78rem;color:#464555}
.auth-tab.active{background:#fff;color:#3525cd;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.dark .auth-tab.active{background:#2a2a38;color:#c3c0ff}
.dark .auth-tab{color:#c7c4d8}

/* ── Avatar ─────────────────────────────────── */
.uavatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#3525cd,#4f46e5);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:.72rem;flex-shrink:0
}

/* ── Priority dots ──────────────────────────── */
.dot-high{background:#ba1a1a}
.dot-medium{background:#684000}
.dot-low{background:#006c49}

/* ── Lang flag buttons ──────────────────────── */
.lang-btn{
  display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;
  font-size:.78rem;font-weight:700;cursor:pointer;transition:all .18s;border:none;
  background:transparent;color:#464555
}
.lang-btn:hover{background:#f0ecf9}
.lang-btn.active{background:#3525cd;color:#fff}
.dark .lang-btn{color:#c7c4d8}
.dark .lang-btn:hover{background:#292932}
.dark .lang-btn.active{background:#4f46e5;color:#fff}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     AUTH PAGE
══════════════════════════════════════════ -->
<main id="pg-auth" class="pg on auth-bg min-h-screen items-center justify-center p-4">
  <div class="w-full max-w-sm fade-in">
    <!-- Переключатель языка на странице авторизации -->
<div class="flex justify-center mb-5">
  <div class="flex items-center gap-1 bg-surf-clo rounded-xl p-1 shadow-ambient">
    <button class="lang-btn px-2 py-1" data-lang="cs">🇨🇿</button>
    <button class="lang-btn px-2 py-1" data-lang="ru">🇷🇺</button>
    <button class="lang-btn px-2 py-1" data-lang="en">🇬🇧</button>
    <button class="lang-btn px-2 py-1" data-lang="ky">🇰🇬</button>
    <button class="lang-btn px-2 py-1" data-lang="kz">🇰🇿</button>
  </div>
</div>
    <div class="text-center mb-7">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl shadow-ambient-lg mb-4" style="background:linear-gradient(135deg,#3525cd,#4f46e5)">
        <span class="material-symbols-outlined text-white text-[26px]">task_alt</span>
      </div>
      <h1 class="text-2xl font-black text-os tracking-tight">Smart Deadline</h1>
      <p class="text-osv text-[.65rem] font-bold mt-1 tracking-widest uppercase">Tracker</p>
    </div>

    <div class="bg-surf-clo rounded-2xl shadow-ambient-lg overflow-hidden">
      <div class="flex items-center gap-1 bg-surf-c p-1 m-4 rounded-xl">
        <button id="tab-login" class="auth-tab active flex-1 text-center" onclick="switchTab('login')" data-i18n="auth.login"></button>
        <button id="tab-register" class="auth-tab flex-1 text-center" onclick="switchTab('register')" data-i18n="auth.register"></button>
      </div>

      <!-- LOGIN -->
      <form id="form-login" class="px-5 pb-5 space-y-3" onsubmit="return false;">
        <div>
          <label class="text-[.6rem] font-bold text-osv uppercase tracking-widest block mb-1.5">Email</label>
          <input id="li-email" type="email" class="ifield" autocomplete="email" data-i18n-ph="auth.emailPh"/>
        </div>
        <div>
          <label class="text-[.6rem] font-bold text-osv uppercase tracking-widest block mb-1.5" data-i18n="auth.password"></label>
          <div class="relative">
            <input id="li-pass" type="password" placeholder="••••••••" class="ifield pr-10" autocomplete="current-password"/>
            <button type="button" onclick="toggleVis('li-pass',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-osv">
              <span class="material-symbols-outlined text-[18px]">visibility</span>
            </button>
          </div>
        </div>
        <p id="li-err" class="text-error text-xs font-medium hidden"></p>
        <button onclick="doLogin()" class="w-full py-3 text-white rounded-xl font-bold text-sm hover:opacity-90 active:scale-[.98] transition-all shadow-ambient mt-1" style="background:linear-gradient(135deg,#3525cd,#4f46e5)" data-i18n="auth.loginBtn"></button>
      </form>

      <!-- REGISTER -->
      <form id="form-register" class="px-5 pb-5 space-y-3 hidden" onsubmit="return false;">
        <div>
          <label class="text-[.6rem] font-bold text-osv uppercase tracking-widest block mb-1.5" data-i18n="auth.name"></label>
          <input id="ri-name" type="text" class="ifield" autocomplete="name" data-i18n-ph="auth.namePh"/>
        </div>
        <div>
          <label class="text-[.6rem] font-bold text-osv uppercase tracking-widest block mb-1.5">Email</label>
          <input id="ri-email" type="email" class="ifield" autocomplete="email" data-i18n-ph="auth.emailPh"/>
        </div>
        <div>
          <label class="text-[.6rem] font-bold text-osv uppercase tracking-widest block mb-1.5" data-i18n="auth.password"></label>
          <div class="relative">
            <input id="ri-pass" type="password" placeholder="••••••••" class="ifield pr-10" autocomplete="new-password"/>
            <button type="button" onclick="toggleVis('ri-pass',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-osv">
              <span class="material-symbols-outlined text-[18px]">visibility</span>
            </button>
          </div>
        </div>
        <div>
          <label class="text-[.6rem] font-bold text-osv uppercase tracking-widest block mb-1.5" data-i18n="auth.confirmPassword"></label>
          <input id="ri-pass2" type="password" placeholder="••••••••" class="ifield" autocomplete="new-password"/>
        </div>
        <p id="ri-err" class="text-error text-xs font-medium hidden"></p>
        <button onclick="doRegister()" class="w-full py-3 text-white rounded-xl font-bold text-sm hover:opacity-90 active:scale-[.98] transition-all shadow-ambient mt-1" style="background:linear-gradient(135deg,#3525cd,#4f46e5)" data-i18n="auth.registerBtn"></button>
      </form>

    </div>
    <p class="text-center text-[.6rem] text-osv/40 font-medium mt-5" data-i18n="auth.localNote"></p>
  </div>
</main>

<!-- ══════════════════════════════════════════
     APP PAGE
══════════════════════════════════════════ -->
<div id="pg-app" class="pg hidden flex-col min-h-screen bg-surf">

  <!-- SIDEBAR (desktop) -->
  <aside class="h-screen w-60 fixed left-0 top-0 bg-surf-c flex flex-col p-3.5 z-50 hidden md:flex">
    <div class="px-3 py-5 mb-1">
      <h1 class="text-base font-black text-indigo-900 leading-tight tracking-tight">Smart Deadline</h1>
      <p class="text-[.58rem] font-bold text-osv uppercase tracking-[.18em] mt-0.5">Tracker</p>
    </div>
    <nav class="flex-1 space-y-0.5">
      <a data-sc="dashboard" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium text-sm cursor-pointer transition-all text-osv hover-ch" href="#">
        <span class="material-symbols-outlined text-[19px]">dashboard</span>
        <span data-i18n="nav.dashboard"></span>
      </a>
      <a data-sc="tasks" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium text-sm cursor-pointer transition-all text-osv hover-ch" href="#">
        <span class="material-symbols-outlined text-[19px]">checklist</span>
        <span data-i18n="nav.tasks"></span>
      </a>
      <a data-sc="calendar" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium text-sm cursor-pointer transition-all text-osv hover-ch" href="#">
        <span class="material-symbols-outlined text-[19px]">calendar_month</span>
        <span data-i18n="nav.calendar"></span>
      </a>
      <a data-sc="pdf" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium text-sm cursor-pointer transition-all text-osv hover-ch" href="#">
        <span class="material-symbols-outlined text-[19px]">picture_as_pdf</span>
        <span data-i18n="nav.pdf"></span>
      </a>
      <a data-sc="settings" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium text-sm cursor-pointer transition-all text-osv hover-ch" href="#">
        <span class="material-symbols-outlined text-[19px]">settings</span>
        <span data-i18n="nav.settings"></span>
      </a>
    </nav>
    <div class="border-t border-ov/20 pt-3 mt-1 space-y-2">
      <div class="flex items-center gap-2.5 px-2.5 py-2 rounded-xl">
        <div id="sb-avatar" class="uavatar">?</div>
        <div class="flex-1 min-w-0">
          <p id="sb-name" class="text-xs font-bold text-os truncate"></p>
          <p id="sb-email" class="text-[.58rem] text-osv truncate"></p>
        </div>
        <button onclick="doLogout()" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-error-container hover:text-on-error-container text-osv transition-colors">
          <span class="material-symbols-outlined text-[14px]">logout</span>
        </button>
      </div>
      <button id="btn-new-sb" class="w-full py-2.5 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-1.5 shadow-ambient hover:opacity-90 active:scale-[.98] transition-all" style="background:linear-gradient(135deg,#3525cd,#4f46e5)">
        <span class="material-symbols-outlined text-[17px]">add</span>
        <span data-i18n="task.newTask"></span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="md:ml-60 flex-1 flex flex-col pb-20 md:pb-0 bg-surf">

    <!-- TOP BAR -->
    <header class="sticky top-0 z-40 glass-nav flex justify-between items-center w-full px-4 md:px-7 py-3 border-b border-ov/20">
      <h2 id="page-title" class="text-sm font-bold text-indigo-900 tracking-tight"></h2>
      <div class="flex items-center gap-2">
        <div class="relative group hidden sm:block">
          <span class="material-symbols-outlined absolute left-2.5 top-1/2 -translate-y-1/2 text-[16px] text-osv group-focus-within:text-primary transition-colors">search</span>
          <input id="search-input" class="ifield pl-8 pr-3 py-1.5 text-xs rounded-full" style="width:170px;padding-top:7px;padding-bottom:7px" data-i18n-ph="task.searchPh" type="text"/>
        </div>
        <button id="theme-btn" class="w-8 h-8 rounded-full flex items-center justify-center text-osv hover-ch transition-colors">
          <span id="theme-icon" class="material-symbols-outlined text-[18px]">dark_mode</span>
        </button>
        <div class="relative">
          <button id="user-menu-btn" onclick="toggleDD()">
            <div id="tb-avatar" class="uavatar cursor-pointer">?</div>
          </button>
          <div id="user-dd" class="absolute right-0 top-10 bg-surf-clo rounded-xl shadow-ambient-lg w-48 z-50 overflow-hidden border border-ov/20">
            <div class="px-3.5 py-2.5 border-b border-ov/20">
              <p id="dd-name" class="text-xs font-bold text-os"></p>
              <p id="dd-email" class="text-[.6rem] text-osv truncate mt-0.5"></p>
            </div>
            <button onclick="doLogout()" class="w-full flex items-center gap-2 px-3.5 py-2.5 text-sm font-medium text-osv hover:bg-error-container hover:text-on-error-container transition-colors">
              <span class="material-symbols-outlined text-[16px]">logout</span>
              <span data-i18n="auth.logout"></span>
            </button>
          </div>
        </div>
        <button id="btn-new-top" class="md:hidden w-8 h-8 rounded-full flex items-center justify-center text-white shadow-sm" style="background:#3525cd">
          <span class="material-symbols-outlined text-[18px]">add</span>
        </button>
      </div>
    </header>

    <!-- ── DASHBOARD ── -->
    <section id="sc-dashboard" class="screen active p-4 md:p-7 max-w-4xl w-full mx-auto space-y-6">
      <div>
        <h3 id="dash-greeting" class="text-3xl md:text-4xl font-black text-os leading-tight tracking-tighter"></h3>
        <p id="dash-sub" class="text-osv font-medium mt-1.5 text-sm"></p>
      </div>
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
        <div class="bg-surf-clo p-4 rounded-2xl shadow-ambient">
          <p class="text-[.58rem] font-bold text-osv uppercase tracking-widest" data-i18n="dash.total"></p>
          <p id="st-total" class="text-3xl font-black text-os mt-1">0</p>
        </div>
        <div class="bg-surf-clo p-4 rounded-2xl shadow-ambient">
          <p class="text-[.58rem] font-bold text-osv uppercase tracking-widest" data-i18n="dash.done"></p>
          <p id="st-done" class="text-3xl font-black mt-1" style="color:#006c49">0</p>
        </div>
        <div class="bg-surf-clo p-4 rounded-2xl shadow-ambient">
          <p class="text-[.58rem] font-bold text-osv uppercase tracking-widest" data-i18n="dash.overdue"></p>
          <p id="st-over" class="text-3xl font-black mt-1" style="color:#ba1a1a">0</p>
        </div>
        <div class="p-4 rounded-2xl text-white" style="background:linear-gradient(135deg,#3525cd,#4f46e5)">
          <p class="text-[.58rem] font-bold text-white/70 uppercase tracking-widest" data-i18n="dash.thisWeek"></p>
          <p id="st-week" class="text-3xl font-black mt-1">0</p>
        </div>
      </div>
      <div>
        <p class="text-[.6rem] font-bold text-osv uppercase tracking-widest mb-3" data-i18n="dash.upcoming"></p>
        <div id="dash-upcoming"></div>
      </div>
    </section>

    <!-- ── TASKS ── -->
    <section id="sc-tasks" class="screen p-4 md:p-7 max-w-4xl w-full mx-auto space-y-4">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <h3 class="text-3xl font-black text-os tracking-tighter" data-i18n="nav.tasks"></h3>
        <button id="btn-new-tasks" class="hidden sm:flex items-center gap-1.5 px-4 py-2 text-white rounded-xl font-bold text-sm shadow-ambient hover:opacity-90 transition-all" style="background:linear-gradient(135deg,#3525cd,#4f46e5)">
          <span class="material-symbols-outlined text-[16px]">add</span>
          <span data-i18n="task.newTask"></span>
        </button>
      </div>
      <div class="flex flex-wrap gap-1.5">
        <button data-f="all"     class="fb px-3.5 py-1.5 rounded-full font-bold text-xs text-white" style="background:#3525cd" data-i18n="filter.all"></button>
        <button data-f="pending" class="fb px-3.5 py-1.5 rounded-full font-bold text-xs bg-surf-ch text-osv" data-i18n="filter.pending"></button>
        <button data-f="done"    class="fb px-3.5 py-1.5 rounded-full font-bold text-xs bg-surf-ch text-osv" data-i18n="filter.done"></button>
        <button data-f="urgent"  class="fb px-3.5 py-1.5 rounded-full font-bold text-xs bg-surf-ch text-osv" data-i18n="filter.urgent"></button>
        <button data-f="overdue" class="fb px-3.5 py-1.5 rounded-full font-bold text-xs bg-surf-ch text-osv" data-i18n="filter.overdue"></button>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-[.58rem] font-bold text-osv uppercase tracking-widest" data-i18n="task.sortBy"></span>
        <div class="flex bg-surf-c rounded-lg p-0.5 gap-0.5">
          <button data-s="deadline" class="sb px-3 py-1.5 rounded-md bg-surf-clo text-primary text-xs font-bold shadow-sm" data-i18n="sort.deadline"></button>
          <button data-s="priority" class="sb px-3 py-1.5 rounded-md text-osv text-xs font-bold" data-i18n="sort.priority"></button>
          <button data-s="name"     class="sb px-3 py-1.5 rounded-md text-osv text-xs font-bold" data-i18n="sort.name"></button>
        </div>

// Active language
let LANG = localStorage.getItem('sdt_lang') || 'cs';
function t(key, vars){
  let s = TRANSLATIONS[LANG]?.[key] || TRANSLATIONS['en']?.[key] || key;
  if(vars) Object.entries(vars).forEach(([k,v])=>s=s.replaceAll('{'+k+'}',v));
  return s;
}
function tArr(key){ return TRANSLATIONS[LANG]?.[key] || TRANSLATIONS['en']?.[key] || []; }

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.dataset.i18n;
    if(el.tagName==='OPTION') el.textContent=t(key);
    else el.textContent=t(key);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    el.placeholder=t(el.dataset.i18nPh);
  });
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===LANG);
  });
  // Update navigation titles map
  TITLES.dashboard=t('nav.dashboard');
  TITLES.tasks=t('nav.tasks');
  TITLES.calendar=t('nav.calendar');
  TITLES.pdf=t('nav.pdf');
  TITLES.settings=t('nav.settings');
  // Re-render active screen title
  const active=document.querySelector('.screen.active');
  if(active){
    const id=active.id.replace('sc-','');
    const title=document.getElementById('page-title');
    if(title) title.textContent=TITLES[id]||'';
  }
}

function setLang(lang){
  LANG=lang;
  localStorage.setItem('sdt_lang',lang);
  applyTranslations();
  renderDash();
  renderTasks();
  renderCal();
  renderSettings();
}

document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click',()=>setLang(b.dataset.lang));
});

function getUsers(){try{return JSON.parse(localStorage.getItem('sdt_users')||'{}')}catch{return{}}}
function setUsers(u){localStorage.setItem('sdt_users',JSON.stringify(u))}
function getSession(){return localStorage.getItem('sdt_sess')||null}
function setSession(e){localStorage.setItem('sdt_sess',e)}
function clearSession(){localStorage.removeItem('sdt_sess')}
function userKey(e){return 'sdt_u_'+e.toLowerCase().replace(/[^a-z0-9]/g,'_')}
function loadUD(e){try{const r=localStorage.getItem(userKey(e));return r?JSON.parse(r):null}catch{return null}}
function saveUD(e,d){localStorage.setItem(userKey(e),JSON.stringify(d))}
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h.toString(36)}

let CU=null;
let S={tasks:[],categories:[],darkMode:false,filter:'all',sort:'deadline',editId:null,cy:new Date().getFullYear(),cm:new Date().getMonth()};

function persist(){
  if(!CU)return;
  saveUD(CU.email,{tasks:S.tasks,categories:S.categories,darkMode:S.darkMode});
}
function loadForUser(email){
  const d=loadUD(email);
  S.tasks=d?.tasks||[];
  S.categories=d?.categories||[];
  S.darkMode=d?.darkMode||false;
  S.filter='all';S.sort='deadline';S.editId=null;
  S.cy=new Date().getFullYear();S.cm=new Date().getMonth();
}

// DARK MODE — fixed using inline styles on body + classes
// ════════════════════════════════════════════════════════
function applyDark(){
  const dark=S.darkMode;
  document.documentElement.classList.toggle('dark',dark);
  // Force body bg/color explicitly
  document.body.style.background = dark ? '#131318' : '#fcf8ff';
  document.body.style.color = dark ? '#e5e1f0' : '#1b1b24';
  const ic=document.getElementById('theme-icon');
  if(ic) ic.textContent=dark?'light_mode':'dark_mode';
  const tog=document.getElementById('set-dark');
  if(tog) tog.checked=dark;
  // Toggle bg for main app page
  const appPage=document.getElementById('pg-app');
  if(appPage){ appPage.style.background = dark?'#131318':'#fcf8ff'; }
  const mainEl=appPage?.querySelector('main');
  if(mainEl){ mainEl.style.background = dark?'#131318':'#fcf8ff'; }
}

document.getElementById('theme-btn').addEventListener('click',()=>{
  S.darkMode=!S.darkMode; applyDark(); persist();
});
document.getElementById('set-dark').addEventListener('change',function(){
  S.darkMode=this.checked; applyDark(); persist();
});

function switchTab(tab){
  ['login','register'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===tab);
    document.getElementById('form-'+x).classList.toggle('hidden',x!==tab);
  });
  clearErrs();
}
function clearErrs(){['li-err','ri-err'].forEach(id=>{const e=document.getElementById(id);e.classList.add('hidden');e.textContent=''})}
function showErr(id,msg){
  const e=document.getElementById(id);e.textContent=msg;e.classList.remove('hidden');
  const p=e.closest('.px-5');if(p){p.classList.add('shake');setTimeout(()=>p.classList.remove('shake'),300)}
}
function toggleVis(id,btn){
  const i=document.getElementById(id),ic=btn.querySelector('.material-symbols-outlined');
  i.type=i.type==='password'?'text':'password';
  ic.textContent=i.type==='password'?'visibility':'visibility_off';
}

function doLogin(){
  const email=document.getElementById('li-email').value.trim().toLowerCase();
  const pass=document.getElementById('li-pass').value;
  if(!email||!pass){showErr('li-err',t('auth.err.fillAll'));return}
  const u=getUsers()[email];
  if(!u){showErr('li-err',t('auth.err.noAccount'));return}
  if(u.ph!==hash(pass)){showErr('li-err',t('auth.err.wrongPass'));return}
  setSession(email);enterApp({email,name:u.name});
}
function doRegister(){
  const name=document.getElementById('ri-name').value.trim();
  const email=document.getElementById('ri-email').value.trim().toLowerCase();
  const pass=document.getElementById('ri-pass').value;
  const pass2=document.getElementById('ri-pass2').value;
  if(!name){showErr('ri-err',t('auth.err.noName'));return}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showErr('ri-err',t('auth.err.badEmail'));return}
  if(pass.length<6){showErr('ri-err',t('auth.err.shortPass'));return}
  if(pass!==pass2){showErr('ri-err',t('auth.err.noMatch'));return}
  const users=getUsers();
  if(users[email]){showErr('ri-err',t('auth.err.exists'));return}
  users[email]={name,ph:hash(pass)};setUsers(users);setSession(email);enterApp({email,name});
}
function doLogout(){
  clearSession();CU=null;
  document.getElementById('pg-auth').classList.add('on');
  document.getElementById('pg-app').classList.remove('on');
  document.getElementById('pg-app').classList.add('hidden');
  ['li-email','li-pass','ri-name','ri-email','ri-pass','ri-pass2'].forEach(id=>document.getElementById(id).value='');
  clearErrs();closeDD();
}
function enterApp(user){
  CU=user;loadForUser(user.email);
  applyDark();applyTranslations();updateUI();
  document.getElementById('pg-auth').classList.remove('on');
  document.getElementById('pg-app').classList.remove('hidden');
  document.getElementById('pg-app').classList.add('on');
  showSc('dashboard');renderSettings();
}
function updateUI(){
  if(!CU)return;
  const ini=CU.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  ['sb-avatar','tb-avatar','set-avatar'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=ini});
  ['sb-name','dd-name','set-name'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=CU.name});
  ['sb-email','dd-email','set-email'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=CU.email});
}
function toggleDD(){document.getElementById('user-dd').classList.toggle('open')}
function closeDD(){document.getElementById('user-dd').classList.remove('open')}
document.addEventListener('click',e=>{if(!e.target.closest('#user-menu-btn')&&!e.target.closest('#user-dd'))closeDD()});

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function now(){return Date.now()}
function cd(dl){
  if(!dl)return'';
  const diff=new Date(dl).getTime()-now();
  if(diff<0)return`<span style="color:#ba1a1a;font-weight:700">${t('task.overdue')}</span>`;
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
  if(d>0)return`<b>${d}d ${h}h</b>`;
  if(h>0)return`<b style="color:#684000">${h}h ${m}m</b>`;
  return`<b style="color:#ba1a1a">${m}m</b>`;
}
function fdate(s){
  if(!s)return'—';
  const d=new Date(s);
  const months=tArr('cal.months');
  if(months.length) return`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  return d.toLocaleDateString();
}
function plbl(p){return t('prio.'+p)||p}
function pclsBg(p){return{high:'background:#ffdad6;color:#93000a',medium:'background:#ffddb8;color:#653e00',low:'background:#6cf8bb;color:#00714d'}[p]||''}
function pdot(p){return{high:'dot-high',medium:'dot-medium',low:'dot-low'}[p]||''}
function isOD(t){return t.deadline&&!t.done&&new Date(t.deadline).getTime()<now()}
function isUrgent(t){return t.priority==='high'&&!t.done}
function isWeek(t){if(!t.deadline||t.done)return false;const d=new Date(t.deadline).getTime(),s=now(),e=s+7*86400000;return d>=s&&d<=e}

const modal=document.getElementById('modal-overlay');
function openModal(id=null){
  S.editId=id;
  const task=id?S.tasks.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=task?t('task.edit'):t('task.new');
  document.getElementById('t-name').value=task?.name||'';
  document.getElementById('t-desc').value=task?.desc||'';
  document.getElementById('t-dl').value=task?.deadline?task.deadline.slice(0,16):'';
  document.getElementById('t-prio').value=task?.priority||'medium';
  // update priority options text
  document.querySelectorAll('#t-prio option').forEach(o=>o.textContent=t('prio.'+o.value));
  const sel=document.getElementById('t-cat');sel.innerHTML='';
  S.categories.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(task?.category===c)o.selected=true;sel.appendChild(o)});
  modal.classList.add('open');

}

document.getElementById('task-form').addEventListener('submit',()=>{

// ════════════════════════════════════════════════════════
// TASK CARD
// ════════════════════════════════════════════════════════
function mkCard(task,alt){
  const od=isOD(task);
  const div=document.createElement('div');
  const bgStyle=alt?'background:var(--surf-cl, #f5f2ff)':'background:#ffffff';
  div.className='task-enter flex items-center gap-3 px-4 py-3 rounded-xl shadow-ambient group transition-all';
  div.style.cssText=S.darkMode?(alt?'background:#1b1b23':'background:#1f1f28'):(alt?'background:#f5f2ff':'background:#ffffff');
  div.dataset.id=task.id;
  const checkStyle=task.done
    ?'background:#006c49;border-color:#006c49'
    :(od?'border-color:#ba1a1a':'border-color:#c7c4d8');
  div.innerHTML=`
    <button class="td flex-shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all" style="${checkStyle}">
      ${task.done?'<span class="material-symbols-outlined text-white" style="font-size:11px">check</span>':''}
    </button>
    <div class="flex-1 min-w-0">
      <p class="font-semibold text-sm leading-tight truncate text-os" style="${task.done?'text-decoration:line-through;opacity:.45':''}">
        ${task.name}</p>
      <p class="text-[.62rem] text-osv truncate mt-0.5">${task.category}${task.deadline?' · '+fdate(task.deadline):''}</p>
    </div>
    <div class="flex items-center gap-1.5 flex-shrink-0">
      ${task.deadline?`<div class="hidden sm:block text-xs">${cd(task.deadline)}</div>`:''}
      <div class="flex items-center gap-1 px-2 py-0.5 rounded-full" style="${pclsBg(task.priority)}">
        <span class="w-1.5 h-1.5 rounded-full flex-shrink-0 ${pdot(task.priority)}"></span>
        <span class="text-[.54rem] font-bold">${plbl(task.priority)}</span>
      </div>
      <div class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
        <button class="be w-7 h-7 flex items-center justify-center rounded-full text-osv hover:bg-surf-ch transition-colors">
          <span class="material-symbols-outlined" style="font-size:13px">edit</span>
        </button>
        <button class="bd w-7 h-7 flex items-center justify-center rounded-full text-osv transition-colors" style="hover:background:#ffdad6">
          <span class="material-symbols-outlined" style="font-size:13px">delete</span>
        </button>
      </div>
    </div>`;
  div.querySelector('.td').addEventListener('click',()=>{
    const x=S.tasks.find(x=>x.id===task.id);if(x){x.done=!x.done;persist();renderTasks();renderDash()}
  });
  div.querySelector('.be').addEventListener('click',()=>openModal(task.id));
  const bdBtn=div.querySelector('.bd');
  bdBtn.addEventListener('mouseenter',()=>bdBtn.style.background='#ffdad6');
  bdBtn.addEventListener('mouseleave',()=>bdBtn.style.background='');
  bdBtn.addEventListener('click',()=>{S.tasks=S.tasks.filter(x=>x.id!==task.id);persist();renderTasks();renderDash()});
  return div;
}

// ════════════════════════════════════════════════════════
// RENDER TASKS
// ════════════════════════════════════════════════════════
function filtered(){
  let tasks=[...S.tasks];
  const q=(document.getElementById('search-input')?.value||'').trim().toLowerCase();
  if(q)tasks=tasks.filter(x=>x.name.toLowerCase().includes(q)||(x.desc||'').toLowerCase().includes(q));
  if(S.filter==='pending')tasks=tasks.filter(x=>!x.done);
  if(S.filter==='done')tasks=tasks.filter(x=>x.done);
  if(S.filter==='urgent')tasks=tasks.filter(x=>isUrgent(x));
  if(S.filter==='overdue')tasks=tasks.filter(x=>isOD(x));
  if(S.sort==='deadline')tasks.sort((a,b)=>{if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return -1;return new Date(a.deadline)-new Date(b.deadline)});
  if(S.sort==='priority'){const p={high:0,medium:1,low:2};tasks.sort((a,b)=>(p[a.priority]||1)-(p[b.priority]||1))}
  if(S.sort==='name')tasks.sort((a,b)=>a.name.localeCompare(b.name));
  return tasks;
}
function renderTasks(){
  const list=document.getElementById('task-list'),empty=document.getElementById('task-empty');
  if(!list)return;
  const tasks=filtered();list.innerHTML='';
  empty.classList.toggle('hidden',tasks.length>0);
  tasks.forEach((t,i)=>list.appendChild(mkCard(t,i%2===1)));
}
document.querySelectorAll('.fb').forEach(btn=>btn.addEventListener('click',()=>{
  S.filter=btn.dataset.f;
  document.querySelectorAll('.fb').forEach(b=>{
    const act=b.dataset.f===S.filter;
    b.style.background=act?'#3525cd':'';
    b.style.color=act?'#ffffff':'';
    b.className=`fb px-3.5 py-1.5 rounded-full font-bold text-xs ${act?'':'bg-surf-ch text-osv'}`;
    if(act){b.style.background='#3525cd';b.style.color='#fff'}
    else{b.style.background='';b.style.color=''}
  });
  renderTasks();
}));
document.querySelectorAll('.sb').forEach(btn=>btn.addEventListener('click',()=>{
  S.sort=btn.dataset.s;
  document.querySelectorAll('.sb').forEach(b=>{
    const act=b.dataset.s===S.sort;
    b.style.background=act?'#fff':'';
    b.style.color=act?'#3525cd':'';
    b.style.boxShadow=act?'0 1px 4px rgba(0,0,0,.08)':'';
  });
  renderTasks();
}));
document.getElementById('search-input').addEventListener('input',renderTasks);

// ════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════
function renderDash(){
  const tasks=S.tasks,done=tasks.filter(x=>x.done).length,over=tasks.filter(x=>isOD(x)).length,week=tasks.filter(x=>isWeek(x)).length;
  document.getElementById('st-total').textContent=tasks.length;
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-over').textContent=over;
  document.getElementById('st-week').textContent=week;
  const g=document.getElementById('dash-greeting');
  if(CU) g.textContent=t('dash.greeting',{name:CU.name.split(' ')[0]});
  const sub=document.getElementById('dash-sub');
  if(tasks.length===0) sub.textContent=t('dash.noTasks');
  else sub.textContent=t('dash.activeTasks',{active:tasks.length-done})+(over>0?t('dash.overdueCount',{n:over}):t('dash.allOk'));
  const up=tasks.filter(x=>!x.done&&x.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,5);
  const ul=document.getElementById('dash-upcoming');ul.innerHTML='';
  if(!up.length){ul.innerHTML=`<p class="text-sm text-osv/50 font-medium">${t('dash.noUpcoming')}</p>`;return}
  up.forEach(x=>ul.appendChild(mkCard(x,false)));
}

// ════════════════════════════════════════════════════════
// CALENDAR
// ════════════════════════════════════════════════════════
function renderCal(){
  const{cy,cm}=S;
  const months=tArr('cal.months'),days=tArr('cal.days');
  document.getElementById('cal-lbl').textContent=`${months[cm]||cm+1} ${cy}`;
  // Header days
  const hdr=document.getElementById('cal-header');hdr.innerHTML='';
  days.forEach(d=>{const el=document.createElement('div');el.className='py-2 text-center text-[.58rem] font-bold text-osv uppercase tracking-widest';el.textContent=d;hdr.appendChild(el)});
  const fd=new Date(cy,cm,1).getDay(),off=(fd===0?6:fd-1),dim=new Date(cy,cm+1,0).getDate(),today=new Date();
  const grid=document.getElementById('cal-days');grid.innerHTML='';
  const tbd={};
  S.tasks.forEach(task=>{if(!task.deadline)return;const d=new Date(task.deadline);if(d.getFullYear()===cy&&d.getMonth()===cm){const day=d.getDate();if(!tbd[day])tbd[day]=[];tbd[day].push(task)}});
  for(let i=0;i<off;i++){const c=document.createElement('div');c.className='h-11 p-1';grid.appendChild(c)}
  for(let day=1;day<=dim;day++){
    const isT=today.getFullYear()===cy&&today.getMonth()===cm&&today.getDate()===day,has=!!tbd[day];
    const cell=document.createElement('button');
    cell.className=`h-11 p-0.5 flex flex-col items-center justify-start gap-0.5 hover-ch transition-colors rounded-lg${isT?' outline outline-2 outline-primary/40':''}`;
    cell.innerHTML=`<span class="text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full" style="${isT?'background:#3525cd;color:#fff':''}">${day}</span>
      ${has?`<div class="flex gap-0.5">${tbd[day].slice(0,3).map(x=>`<span class="w-1 h-1 rounded-full ${pdot(x.priority)}"></span>`).join('')}</div>`:''}`;
    cell.addEventListener('click',()=>showCalDay(day,tbd[day]||[]));
    grid.appendChild(cell);
  }
  document.getElementById('cal-day-box').classList.add('hidden');
}
function showCalDay(day,tasks){
  const months=tArr('cal.months');
  document.getElementById('cal-day-title').textContent=t('cal.deadlines',{d:day,m:S.cm+1,y:S.cy});
  const list=document.getElementById('cal-day-list');list.innerHTML='';
  document.getElementById('cal-day-box').classList.remove('hidden');
  if(!tasks.length){list.innerHTML=`<p class="text-sm text-osv/50">${t('cal.noTasks')}</p>`;return}
  tasks.forEach(x=>list.appendChild(mkCard(x,false)));
}
document.getElementById('cal-prev').addEventListener('click',()=>{S.cm--;if(S.cm<0){S.cm=11;S.cy--}renderCal()});
document.getElementById('cal-next').addEventListener('click',()=>{S.cm++;if(S.cm>11){S.cm=0;S.cy++}renderCal()});

const pdfDrop=document.getElementById('pdf-drop'),pdfInp=document.getElementById('pdf-inp');

async function parsePDF(file){
  if(typeof pdfjsLib==='undefined'){alert(t('pdf.noLib'));return}
  const pg=document.getElementById('pdf-prog'),bar=document.getElementById('pdf-prog-bar'),txt=document.getElementById('pdf-prog-txt');
  document.getElementById('pdf-res').classList.add('hidden');pg.classList.remove('hidden');bar.style.width='10%';txt.textContent=t('pdf.loading');
  try{
    const buf=await file.arrayBuffer();bar.style.width='30%';
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    bar.style.width='50%';txt.textContent=t('pdf.reading',{n:pdf.numPages});
    let fullText='';
    for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const tc=await p.getTextContent();fullText+=tc.items.map(x=>x.str).join(' ')+'\n';bar.style.width=(50+i/pdf.numPages*45)+'%'}
    bar.style.width='100%';txt.textContent=t('pdf.searching');
    const ex=extractTasks(fullText);
    setTimeout(()=>{pg.classList.add('hidden');showPDFResults(ex)},250);
  }catch(e){pg.classList.add('hidden');alert(t('pdf.error')+e.message)}
}
function extractTasks(text){
  const tasks=[],seen=new Set();
  text.split('\n').forEach(line=>{
    const cl=line.trim();if(cl.length<4)return;
    let fd=null;
    let m=cl.match(/(\d{1,2})\s*\.\s*(\d{1,2})\s*\.\s*(20\d{2})/);
    if(m)fd=`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}T23:59`;
    if(!fd){m=cl.match(/(20\d{2})-(\d{2})-(\d{2})/);if(m)fd=`${m[1]}-${m[2]}-${m[3]}T23:59`}
    if(!fd)return;
    const kw=cl.match(/(odevzdat|submit|deadline|projekt|homework|úkol|assignment|exam|zkouška|prezentace|report|семинар|сдать|задание|экзамен)[^\n]*/i);
    const name=(kw?kw[0]:cl).substring(0,80).replace(/\s+/g,' ').trim();
    if(name.length<4||seen.has(name+fd))return;
    seen.add(name+fd);
    const defaultCat=tArr('defaultCats')[0]||'';
    tasks.push({id:uid(),name:name.charAt(0).toUpperCase()+name.slice(1),desc:'PDF',deadline:fd,priority:'medium',category:defaultCat,done:false,createdAt:now()});
  });
  return tasks.slice(0,20);
}
function showPDFResults(tasks){
  const res=document.getElementById('pdf-res'),list=document.getElementById('pdf-list');
  list.innerHTML='';res.classList.remove('hidden');
  const addAllBtn=document.getElementById('pdf-add-all');
  if(!tasks.length){
    list.innerHTML=`<div class="p-4 bg-surf-c rounded-xl text-sm text-osv">${t('pdf.noFound')}</div>`;
    addAllBtn.classList.add('hidden');return;
  }
  addAllBtn.classList.remove('hidden');
  tasks.forEach(task=>{
    const div=document.createElement('div');
    div.className='flex items-center gap-3 p-3 bg-surf-clo rounded-xl shadow-ambient';
    div.innerHTML=`<div class="flex-1 min-w-0"><p class="font-semibold text-sm truncate text-os">${task.name}</p><p class="text-xs text-osv mt-0.5">${t('pdf.deadline')}${fdate(task.deadline)}</p></div>
      <button class="pa px-3 py-1.5 text-white rounded-lg text-xs font-bold hover:opacity-90 transition-all whitespace-nowrap" style="background:#3525cd">${t('pdf.add')}</button>`;
    div.querySelector('.pa').addEventListener('click',function(){
      if(!S.tasks.find(x=>x.id===task.id)){S.tasks.unshift({...task});persist();renderDash();renderTasks()}
      this.textContent=t('pdf.added');this.disabled=true;this.style.background='#006c49';
    });
    list.appendChild(div);
  });
}
document.getElementById('pdf-add-all').addEventListener('click',()=>document.querySelectorAll('.pa:not([disabled])').forEach(b=>b.click()));
